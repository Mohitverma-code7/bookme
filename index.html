<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BOOK MY TICKET</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Roboto Mono', monospace;
  background: #f6f7fb;
  color: #111;
}

/* CONTAINER */
.container {
  max-width: 1200px;
  margin: 20px auto;
  padding: 30px;
  background: #fff;
  border: 4px solid #111;
  box-shadow: 10px 10px 0 #c7d2fe;
}

/* HEADER */
.header {
  position: relative;
  text-align: center;
  margin-bottom: 10px;
}

.header h1 {
  font-family: 'Orbitron';
  font-size: 2.5rem;
  border: 3px solid #111;
  padding: 15px;
  display: inline-block;
  background: #fff;
  box-shadow: 8px 8px 0 #a5b4fc;
}

.movie-title {
  display: block;
  font-size: 1rem;
  color: #6366f1;
}

/* AUTH */
.auth-section {
  position: absolute;
  top: 10px;
  right: 10px;
  display: flex;
  gap: 10px;
}

.auth-btn {
  padding: 8px 14px;
  border: 2px solid #111;
  background: #fff;
  font-weight: 700;
  cursor: pointer;
  transition: 0.2s;
}

.auth-btn:hover {
  transform: translate(-2px,-2px);
}

.user-display {
  padding: 8px 12px;
  border: 2px solid #111;
  background: #eef2ff;
  font-weight: 800;
}

/* FILTER BAR */
.filter-bar {
  text-align: center;
  margin: 20px 0;
}

.btn {
  padding: 10px 16px;
  border: 2px solid #111;
  background: #fff;
  font-weight: 700;
  cursor: pointer;
  margin: 0 5px;
  box-shadow: 3px 3px 0 #a5b4fc;
  transition: 0.2s;
}

.btn:hover {
  transform: translate(-2px,-2px);
}

/* SEATS */
.seats-table {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 12px;
  padding: 25px;
  border: 3px solid #111;
  background: #f9fafb;
}

.seat {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 3px solid #111;
  font-weight: 900;
  cursor: pointer;
  background: #fff;
  transition: 0.2s;
  position: relative; /* IMPORTANT FOR TOOLTIP */
}

.seat:hover {
  transform: scale(1.05);
}

.seat.available { background: #dcfce7; }
.seat.booked { background: #fee2e2; cursor: not-allowed; }

/* ================= TOOLTIP (NEW) ================= */
.tooltip {
  position: absolute;
  bottom: 110%;
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: #fff;
  padding: 6px 10px;
  font-size: 12px;
  border-radius: 6px;
  white-space: nowrap;
  opacity: 0;
  transition: 0.2s;
  pointer-events: none;
  z-index: 10;
}

.seat:hover .tooltip {
  opacity: 1;
}

/* arrow */
.tooltip::after {
  content: "";
  position: absolute;
  top: 100%;
  left: 50%;
  transform: translateX(-50%);
  border: 6px solid transparent;
  border-top-color: #111;
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 999;
}

.modal.active { display: flex; }

.modal-content {
  background: #fff;
  padding: 25px;
  border: 3px solid #111;
  width: 300px;
}

.modal input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
}
</style>
</head>

<body>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="auth-section" id="authSection"></div>

  <h1>
    BOOK MY TICKET
    <span class="movie-title">Dhurandhar The Revenge</span>
  </h1>
</div>

<!-- FILTER BUTTONS -->
<div class="filter-bar">
  <button class="btn" onclick="showAll()">ALL SEATS</button>
  <button class="btn" onclick="showAvailable()">AVAILABLE</button>
  <button class="btn" onclick="showBooked()">BOOKED ONLY</button>
</div>

<!-- SEATS -->
<div class="seats-table" id="tbl"></div>

</div>

<!-- LOGIN -->
<div class="modal" id="loginModal">
  <div class="modal-content">
    <h3>Login</h3>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<!-- REGISTER -->
<div class="modal" id="registerModal">
  <div class="modal-content">
    <h3>Register</h3>
    <input id="regUser" placeholder="Username">
    <input id="regPass" type="password" placeholder="Password">
    <button onclick="register()">Register</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

let token = localStorage.getItem("token");
let currentUser = JSON.parse(localStorage.getItem("user"));
let allSeats = [];

/* AUTH UI */
function updateAuthUI() {
  const auth = document.getElementById("authSection");

  if (token && currentUser) {
    auth.innerHTML = `
      <div class="user-display">${currentUser.username.toUpperCase()}</div>
      <button class="auth-btn" onclick="logout()">Logout</button>
    `;
  } else {
    auth.innerHTML = `
      <button class="auth-btn" onclick="openLogin()">Login</button>
      <button class="auth-btn" onclick="openRegister()">Register</button>
    `;
  }
}

/* MODALS */
function openLogin() {
  document.getElementById("loginModal").classList.add("active");
}
function openRegister() {
  document.getElementById("registerModal").classList.add("active");
}
function closeModal() {
  document.getElementById("loginModal").classList.remove("active");
  document.getElementById("registerModal").classList.remove("active");
}

/* LOAD SEATS */
async function loadSeats() {
  const res = await fetch("/seats");
  allSeats = await res.json();
  renderSeats(allSeats);
}

/* ================= RENDER WITH TOOLTIP ================= */
function renderSeats(seats) {
  const tbl = document.getElementById("tbl");
  tbl.innerHTML = "";

  seats.forEach(seat => {
    const div = document.createElement("div");
    div.className = `seat ${seat.isbooked ? "booked" : "available"}`;
    div.textContent = seat.id;

    // TOOLTIP
    const tooltip = document.createElement("div");
    tooltip.className = "tooltip";

    if (seat.isbooked) {
      tooltip.innerHTML = `Booked by: <b>${seat.username || "Unknown"}</b>`;
    } else {
      tooltip.innerHTML = `Available`;
    }

    div.appendChild(tooltip);

    if (!seat.isbooked) {
      div.onclick = () => bookSeat(seat.id);
    }

    tbl.appendChild(div);
  });
}

/* FILTERS */
function showAll() {
  renderSeats(allSeats);
}

function showBooked() {
  renderSeats(allSeats.filter(s => s.isbooked === 1 || s.isbooked === true));
}

function showAvailable() {
  renderSeats(allSeats.filter(s => s.isbooked === 0 || s.isbooked === false));
}

/* BOOK SEAT */
async function bookSeat(id) {
  if (!token) return openLogin();

  await fetch(`/${id}`, {
    method: "PUT",
    headers: {
      Authorization: `Bearer ${token}`
    }
  });

  loadSeats();
}

/* LOGIN */
async function login() {
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: loginUser.value,
      password: loginPass.value
    })
  });

  const data = await res.json();
  if (!res.ok) return alert(data.error);

  token = data.token;
  currentUser = data.user;

  localStorage.setItem("token", token);
  localStorage.setItem("user", JSON.stringify(currentUser));

  closeModal();
  updateAuthUI();
  loadSeats();
}

/* REGISTER */
async function register() {
  const res = await fetch("/register", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      username: regUser.value,
      password: regPass.value
    })
  });

  const data = await res.json();
  if (!res.ok) return alert(data.error);

  alert("Registered! Now login 🎉");
  closeModal();
}

/* LOGOUT */
function logout() {
  localStorage.clear();
  token = null;
  currentUser = null;
  updateAuthUI();
  loadSeats();
}

/* INIT */
updateAuthUI();
loadSeats();

</script>

</body>
</html>
