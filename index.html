<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOOK MY TICKET</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto Mono', monospace;
      background: #f6f7fb;
      color: #111;
      min-height: 100vh;
    }

    .container {
      max-width: 1400px;
      margin: 20px auto;
      padding: 40px 20px;
      background: #fff;
      border: 4px solid #111;
      box-shadow: 10px 10px 0 #c7d2fe;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      position: relative;
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-family: 'Orbitron', monospace;
      font-size: 3rem;
      border: 3px solid #111;
      padding: 20px;
      display: inline-block;
      background: #fff;
      box-shadow: 8px 8px 0 #a5b4fc;
    }

    .movie-title {
      display: block;
      font-size: 1rem;
      color: #6366f1;
      margin-top: 5px;
    }

    /* AUTH (TOP RIGHT INSIDE HEADER) */
    .auth-section {
      position: absolute;
      top: 10px;
      right: 10px;

      display: flex;
      gap: 10px;
      align-items: center;

      padding: 8px 12px;
      border: 2px solid #111;
      background: #fff;
      box-shadow: 4px 4px 0 #c7d2fe;
    }

    .auth-btn {
      padding: 6px 12px;
      border: 2px solid #111;
      background: #fff;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 3px 3px 0 #a5b4fc;
      transition: 0.2s;
    }

    .auth-btn:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 #6366f1;
    }

    .user-display {
      padding: 6px 10px;
      border: 2px solid #111;
      background: #eef2ff;
      font-weight: 800;
      box-shadow: 3px 3px 0 #a5b4fc;
    }

    .tagline {
      text-align: center;
      margin-bottom: 30px;
      color: #555;
    }

    /* FILTER */
    .filter-bar {
      text-align: center;
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 16px;
      border: 3px solid #111;
      background: #fff;
      font-weight: 700;
      cursor: pointer;
      margin: 0 5px;
      box-shadow: 4px 4px 0 #c7d2fe;
      transition: 0.2s;
    }

    .btn:hover {
      transform: translate(-2px, -2px);
    }

    /* LEGEND */
    .legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .legend-item {
      border: 3px solid #111;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      box-shadow: 5px 5px 0 #e5e7eb;
    }

    .dot {
      width: 18px;
      height: 18px;
      border: 2px solid #111;
    }

    .available { background: #86efac; }
    .booked { background: #fca5a5; }

    /* SEATS GRID */
    .seats-table {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 14px;
      padding: 30px;
      border: 3px solid #111;
      background: #f9fafb;
      box-shadow: 10px 10px 0 #e5e7eb;
    }

    .seats-table tr { display: contents; }

    .seat {
      width: 100%;
      height: 70px;
      border: 3px solid #111;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: 900;
      cursor: pointer;
      position: relative;
      transition: 0.2s ease;
      background: #fff;
      border-radius: 8px;
    }

    .seat.available {
      background: #dcfce7;
      box-shadow: 5px 5px 0 #a5b4fc;
    }

    .seat.available:hover {
      transform: translate(-3px, -3px);
      box-shadow: 8px 8px 0 #6366f1;
    }

    .seat.booked {
      background: #fee2e2;
      cursor: not-allowed;
      box-shadow: 5px 5px 0 #fda4af;
    }

    .tooltip {
      position: absolute;
      bottom: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #fff;
      border: 2px solid #111;
      padding: 6px 10px;
      font-size: 12px;
      white-space: nowrap;
      box-shadow: 4px 4px 0 #c7d2fe;
      opacity: 0;
      transition: 0.2s;
      pointer-events: none;
    }

    .seat:hover .tooltip {
      opacity: 1;
    }

  </style>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">

    <div class="auth-section" id="authSection"></div>

    <h1>
      BOOK MY TICKET
      <span class="movie-title">Dhurandhar The Revenge</span>
    </h1>

  </div>

  <p class="tagline">Filter your seats easily 🔥</p>

  <!-- FILTER -->
  <div class="filter-bar">
    <button class="btn" onclick="openLogin()">ALL SEATS</button>
    <button class="btn" onclick="openRegister()">BOOKED ONLY</button>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="legend-item">
      <div class="dot available"></div> AVAILABLE
    </div>
    <div class="legend-item">
      <div class="dot booked"></div> BOOKED
    </div>
  </div>

  <table class="seats-table" id="tbl"></table>

</div>

<div id="loginModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:20px; border:3px solid #111;">
  <h3>Login</h3>
  <input id="loginUser" placeholder="Username"><br><br>
  <input id="loginPass" type="password" placeholder="Password"><br><br>
  <button onclick="login()">Login</button>
  <button onclick="closeModal()">Close</button>
</div>

<div id="registerModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; padding:20px; border:3px solid #111;">
  <h3>Register</h3>
  <input id="regUser" placeholder="Username"><br><br>
  <input id="regPass" type="password" placeholder="Password"><br><br>
  <button onclick="register()">Register</button>
  <button onclick="closeModal()">Close</button>
</div>

<script>
let token = localStorage.getItem('token');
let currentUser = JSON.parse(localStorage.getItem('user'));
let allSeats = [];

function updateAuthUI() {
  const auth = document.getElementById('authSection');

  if (token && currentUser) {
    auth.innerHTML = `
      <div class="user-display">👤 ${currentUser.username.toUpperCase()}</div>
      <button class="auth-btn" onclick="logout()">Logout</button>
    `;
  } else {
    auth.innerHTML = `
      <button class="auth-btn" onclick="alert('Login modal')">Login</button>
      <button class="auth-btn" onclick="alert('Register modal')">Register</button>
    `;
  }
}

/* LOAD SEATS */
async function loadSeats() {
  const res = await fetch('/seats');
  allSeats = await res.json();
  renderSeats(allSeats);
}

/* RENDER */
function renderSeats(seats) {
  const tbl = document.getElementById('tbl');
  tbl.innerHTML = '';

  let row;

  seats.forEach((seat, i) => {
    if (i % 8 === 0) {
      row = document.createElement('tr');
      tbl.appendChild(row);
    }

    const td = document.createElement('td');
    td.className = `seat ${seat.isbooked ? 'booked' : 'available'}`;
    td.textContent = seat.id;

    const tooltip = document.createElement('div');
    tooltip.className = 'tooltip';

    tooltip.innerHTML = seat.isbooked
      ? `Booked by: <b>${seat.username || 'Unknown'}</b>`
      : 'Available';

    td.appendChild(tooltip);

    if (!seat.isbooked) {
      td.onclick = () => bookSeat(seat.id);
    }

    row.appendChild(td);
  });
}

/* FILTER */
function showAll() {
  renderSeats(allSeats);
}

function showBooked() {
  renderSeats(allSeats.filter(s => s.isbooked === 1));
}

/* BOOK */
async function bookSeat(id) {
  if (!token) return alert("Login required");

  await fetch(`/${id}`, {
    method: 'PUT',
    headers: { Authorization: `Bearer ${token}` }
  });

  loadSeats();
}

function openLogin() {
  document.getElementById("loginModal").style.display = "block";
}

function openRegister() {
  document.getElementById("registerModal").style.display = "block";
}

function closeModal() {
  document.getElementById("loginModal").style.display = "none";
  document.getElementById("registerModal").style.display = "none";
}

async function register() {
  const username = document.getElementById("regUser").value;
  const password = document.getElementById("regPass").value;

  const res = await fetch("/register", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();
  alert(data.message || data.error);
}

async function login() {
  const username = document.getElementById("loginUser").value;
  const password = document.getElementById("loginPass").value;

  const res = await fetch("/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ username, password })
  });

  const data = await res.json();

  if (data.token) {
    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify(data.user));
    location.reload();
  } else {
    alert(data.error);
  }
}

/* LOGOUT */
function logout() {
  localStorage.clear();
  token = null;
  currentUser = null;
  updateAuthUI();
}

/* INIT */
updateAuthUI();
loadSeats();
</script>

</body>
</html>
